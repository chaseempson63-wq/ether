<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <radialGradient id="bg-glow-main" cx="35%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#0c1424"/>
      <stop offset="100%" stop-color="#080b14"/>
    </radialGradient>
    <radialGradient id="glow-lg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </radialGradient>
    <radialGradient id="glow-sm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="80%" stop-color="#3b82f6"/>
    </radialGradient>
    <filter id="bloom">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <filter id="bg-bloom-lg">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600&amp;family=Source+Serif+4:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#080b14"/>
  <rect width="1500" height="500" fill="url(#bg-glow-main)"/>

  <!-- Background dot grid (subtle) -->
  <g opacity="0.04" fill="#3b82f6">
    <circle cx="100" cy="80" r="1.5"/><circle cx="200" cy="80" r="1"/><circle cx="300" cy="80" r="1.5"/>
    <circle cx="400" cy="80" r="1"/><circle cx="500" cy="80" r="1.5"/><circle cx="600" cy="80" r="1"/>
    <circle cx="700" cy="80" r="1.5"/><circle cx="800" cy="80" r="1"/><circle cx="900" cy="80" r="1.5"/>
    <circle cx="1000" cy="80" r="1"/><circle cx="1100" cy="80" r="1.5"/><circle cx="1200" cy="80" r="1"/>
    <circle cx="1300" cy="80" r="1.5"/><circle cx="1400" cy="80" r="1"/>
    <circle cx="150" cy="160" r="1"/><circle cx="250" cy="160" r="1.5"/><circle cx="350" cy="160" r="1"/>
    <circle cx="450" cy="160" r="1.5"/><circle cx="550" cy="160" r="1"/><circle cx="650" cy="160" r="1.5"/>
    <circle cx="750" cy="160" r="1"/><circle cx="850" cy="160" r="1.5"/><circle cx="950" cy="160" r="1"/>
    <circle cx="1050" cy="160" r="1.5"/><circle cx="1150" cy="160" r="1"/><circle cx="1250" cy="160" r="1.5"/>
    <circle cx="1350" cy="160" r="1"/>
    <circle cx="100" cy="240" r="1.5"/><circle cx="200" cy="240" r="1"/><circle cx="300" cy="240" r="1.5"/>
    <circle cx="400" cy="240" r="1"/><circle cx="500" cy="240" r="1.5"/><circle cx="600" cy="240" r="1"/>
    <circle cx="700" cy="240" r="1.5"/><circle cx="800" cy="240" r="1"/><circle cx="900" cy="240" r="1.5"/>
    <circle cx="1000" cy="240" r="1"/><circle cx="1100" cy="240" r="1.5"/><circle cx="1200" cy="240" r="1"/>
    <circle cx="1300" cy="240" r="1.5"/><circle cx="1400" cy="240" r="1"/>
    <circle cx="150" cy="320" r="1"/><circle cx="250" cy="320" r="1.5"/><circle cx="350" cy="320" r="1"/>
    <circle cx="450" cy="320" r="1.5"/><circle cx="550" cy="320" r="1"/><circle cx="650" cy="320" r="1.5"/>
    <circle cx="750" cy="320" r="1"/><circle cx="850" cy="320" r="1.5"/><circle cx="950" cy="320" r="1"/>
    <circle cx="1050" cy="320" r="1.5"/><circle cx="1150" cy="320" r="1"/><circle cx="1250" cy="320" r="1.5"/>
    <circle cx="1350" cy="320" r="1"/>
    <circle cx="100" cy="400" r="1.5"/><circle cx="200" cy="400" r="1"/><circle cx="300" cy="400" r="1.5"/>
    <circle cx="400" cy="400" r="1"/><circle cx="500" cy="400" r="1.5"/><circle cx="600" cy="400" r="1"/>
    <circle cx="700" cy="400" r="1.5"/><circle cx="800" cy="400" r="1"/><circle cx="900" cy="400" r="1.5"/>
    <circle cx="1000" cy="400" r="1"/><circle cx="1100" cy="400" r="1.5"/><circle cx="1200" cy="400" r="1"/>
    <circle cx="1300" cy="400" r="1.5"/><circle cx="1400" cy="400" r="1"/>
  </g>

  <!-- Background connecting lines (very subtle) -->
  <g stroke="#3b82f6" opacity="0.03" stroke-width="0.5">
    <line x1="100" y1="80" x2="250" y2="160"/>
    <line x1="300" y1="80" x2="350" y2="160"/>
    <line x1="900" y1="240" x2="1050" y2="320"/>
    <line x1="1100" y1="80" x2="1250" y2="160"/>
    <line x1="1200" y1="240" x2="1350" y2="320"/>
    <line x1="500" y1="400" x2="650" y2="320"/>
  </g>

  <!-- Ambient glow behind logo area -->
  <circle cx="420" cy="250" r="180" fill="#3b82f6" opacity="0.04" filter="url(#bg-bloom-lg)"/>

  <!-- Logo mark -->
  <g transform="translate(310, 112) scale(2.6)">
    <g filter="url(#bloom)" opacity="0.3">
      <circle cx="50" cy="14" r="7" fill="#3b82f6"/>
      <circle cx="84" cy="38" r="4.5" fill="#3b82f6"/>
      <circle cx="18" cy="36" r="5.5" fill="#3b82f6"/>
      <circle cx="68" cy="72" r="5" fill="#3b82f6"/>
      <circle cx="32" cy="74" r="4.5" fill="#3b82f6"/>
    </g>
    <g stroke="#3b82f6" fill="none" stroke-linecap="round">
      <line x1="50" y1="14" x2="84" y2="38" stroke-width="1.4" opacity="0.5"/>
      <line x1="50" y1="14" x2="18" y2="36" stroke-width="1.4" opacity="0.52"/>
      <line x1="84" y1="38" x2="68" y2="72" stroke-width="1.2" opacity="0.42"/>
      <line x1="18" y1="36" x2="32" y2="74" stroke-width="1.2" opacity="0.44"/>
      <line x1="68" y1="72" x2="32" y2="74" stroke-width="1.2" opacity="0.38"/>
      <line x1="50" y1="14" x2="50" y2="46" stroke-width="1" opacity="0.32"/>
      <line x1="50" y1="46" x2="68" y2="72" stroke-width="0.8" opacity="0.22"/>
      <line x1="50" y1="46" x2="32" y2="74" stroke-width="0.8" opacity="0.22"/>
      <line x1="50" y1="14" x2="68" y2="72" stroke-width="0.6" opacity="0.14"/>
      <line x1="84" y1="38" x2="32" y2="74" stroke-width="0.6" opacity="0.11"/>
      <line x1="18" y1="36" x2="68" y2="72" stroke-width="0.6" opacity="0.12"/>
    </g>
    <circle cx="50" cy="14" r="7" fill="url(#glow-lg)"/>
    <circle cx="84" cy="38" r="4.5" fill="url(#glow-lg)"/>
    <circle cx="18" cy="36" r="5.5" fill="url(#glow-lg)"/>
    <circle cx="68" cy="72" r="5" fill="url(#glow-lg)"/>
    <circle cx="32" cy="74" r="4.5" fill="url(#glow-lg)"/>
    <circle cx="50" cy="46" r="3" fill="url(#glow-sm)" opacity="0.65"/>
  </g>

  <!-- Wordmark -->
  <text
    x="600"
    y="230"
    font-family="'Sora', 'Inter', -apple-system, sans-serif"
    font-weight="600"
    font-size="72"
    fill="#ffffff"
    letter-spacing="0.03em"
  >Ether</text>

  <!-- Tagline -->
  <text
    x="604"
    y="290"
    font-family="'Source Serif 4', 'Source Serif Pro', Georgia, serif"
    font-weight="400"
    font-size="24"
    fill="#94a3b8"
    letter-spacing="0.01em"
  >Your Digital Mind. Living Forever.</text>

  <!-- Accent line under tagline -->
  <line x1="604" y1="310" x2="700" y2="310" stroke="#3b82f6" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
</svg>
